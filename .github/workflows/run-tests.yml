name: Run tests

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      test_mod:
        description: 'Způsob testování'
        required: true
        type: choice
        options:
          - vsechny
          - neuspesne
          - konkretni
        default: vsechny

      test_cislo:
        description: 'Číslo testu (použij jen pokud zvolen režim "konkretni")'
        required: false
        type: string

      nasadit_verzi:
        description: 'Nasadit aktuální verzi před testováním'
        required: false
        type: boolean
        default: true

concurrency:
  group: tests-${{ github.repository }}
  cancel-in-progress: true

env:
  server_deploy_root: /home/amcr/aiscr-webamcr
  dep_script: scripts/ci_deployment/deploy_test_server.sh
  test_script: scripts/start_selenium_tests.sh

jobs:
  deployment:
    name: Deploy to DEV Server and test
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get --assume-yes --no-install-recommends install openvpn iputils-ping dnsutils    

      - name: Setup VPN config
        run: |
          tmpdir=$(mktemp -d)
          echo "VPN_TMPDIR=$tmpdir" >> $GITHUB_ENV
          cp .github/vpn/openvpn20_huldio_ci.ovpn "$tmpdir/"
          echo "${{ secrets.VPN_CA_CRT }}" > "$tmpdir/openvpn20_huldio_ci_ca.crt"
          echo "${{ secrets.VPN_USER_CRT }}" > "$tmpdir/openvpn20_huldio_ci_user.crt"
          echo "${{ secrets.VPN_USER_KEY }}" > "$tmpdir/openvpn20_huldio_ci_user.key"
          echo "${{ secrets.VPN_SECRET_USERNAME_PASSWORD }}" > "$tmpdir/secret.txt"

      - name: Connect VPN
        run: sudo openvpn --config "$VPN_TMPDIR/openvpn20_huldio_ci.ovpn" --daemon --askpass "$VPN_TMPDIR/secret.txt"

      - name: Wait for VPN & DNS resolve
        shell: bash
        timeout-minutes: 2
        run: |
          for i in {1..10}; do
            if ping -c 1 ${{ secrets.DEPLOYMENT_SERVER_DEV }}; then
              break
            fi
            sleep 3
          done
          if ! ping -c 1 ${{ secrets.DEPLOYMENT_SERVER_DEV }}; then
            echo "::error::VPN connection failed"
            exit 1
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_SERVER_DEV }}

      - name: SSH deployment a testy
        shell: bash
        run: |
          set -euo pipefail
          # Pre-fill known_hosts once
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOST_DEV }}" >> ~/.ssh/known_hosts
          
          # Pass variables explicitly to the SSH session
          ssh amcr@${{ secrets.DEPLOYMENT_SERVER_DEV }} \
            "NASADIT='${{ inputs.nasadit_verzi }}' \
             TEST_MOD='${{ inputs.test_mod }}' \
             TEST_CISLO='${{ inputs.test_cislo }}' \
             REF_NAME='${{ github.ref_name }}' \
             SERVER_ROOT='${{ env.server_deploy_root }}' \
             DEP_SCRIPT='${{ env.dep_script }}' \
             TEST_SCRIPT='${{ env.test_script }}' bash -s" << 'EOF'
            
            set -euo pipefail
            sudo bash -c "
              cd $SERVER_ROOT
              chmod +x $DEP_SCRIPT $TEST_SCRIPT

              if [ \"$NASADIT\" = \"true\" ]; then
                ./$DEP_SCRIPT $SERVER_ROOT $REF_NAME
              fi

              echo "Spouštím testy v režimu: $TEST_MOD"
              
              if [ "$TEST_MOD" = "konkretni" ] && [ -z "$TEST_CISLO" ]; then
                echo "Missing test number"
                exit 1
              fi

              case \"$TEST_MOD\" in
                vsechny)
                echo "Testuji vše"
                ./$TEST_SCRIPT
                ;;
                neuspesne)
                echo "Testuji pouze neúspěšné"
                ./$TEST_SCRIPT -f
                ;;
                konkretni)
                echo "Testuji test č. $TEST_CISLO"
                ./$TEST_SCRIPT -t \"$TEST_CISLO\" ;;
                *) exit 1 ;;
              esac
            "
          EOF

      - name: Stáhnout a zobrazit výsledky testů
        id: test-result
        shell: bash
        run: |
          set -euo pipefail
          # scp uses the same agent/known_hosts          
          scp amcr@${{ secrets.DEPLOYMENT_SERVER_DEV }}:/opt/selenium_test/results.xlsx ./results.xlsx
          scp amcr@${{ secrets.DEPLOYMENT_SERVER_DEV }}:/opt/selenium_test/test_summary.env ./test_summary.env
          
          source ./test_summary.env
          echo "PASSED=$PASSED" >> $GITHUB_OUTPUT
          echo "FAILED=$FAILED" >> $GITHUB_OUTPUT

          {
            echo "## 🧪 Výsledky testů"
            echo "| Stav | Počet |"
            echo "|------|-------|"
            echo "| ✅ Prošlo | $PASSED |"
            echo "| ❌ Selhalo | $FAILED |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Nahrát výsledky testů jako artifact
        uses: actions/upload-artifact@v6
        with:
          name: selenium-vysledky
          path: ./results.xlsx

      - name: Disconnect VPN
        if: always()
        run: |
          sudo pkill openvpn || true

      - name: Aktualizovat výsledek testu
        shell: bash
        run: |
          # Pokud nějaký test selhal → celý workflow FAIL
          set -euo pipefail
          if [ "${{ steps.test-result.outputs.FAILED }}" -gt 0 ]; then
            echo "::error::Selhalo ${{ steps.test-result.outputs.FAILED }} testů"
            exit 1
          fi
