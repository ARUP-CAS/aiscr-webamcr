name: Pre-commit

on:
  pull_request:
  push:
    branches:
      - dev
      - test
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    if: |
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.ref_name, 'pre-commit-fixes/')

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - run: pip install --upgrade pre-commit

      # 🔍 Run and capture exit code
      - name: Run pre-commit
        id: hooks
        run: |
          set +e
          pre-commit run --all-files
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0

      # 🔎 Detect file modifications
      - name: Check for file changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 🛠 Create fix PR only if files were modified
      - name: Create Pull Request with fixes
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: apply pre-commit fixes"
          branch: pre-commit-fixes/${{ github.event.pull_request.number || steps.vars.outputs.sha_short }}-${{ github.run_id }}
          delete-branch: true
          base: ${{ github.head_ref || github.ref_name }}
          title: "Automatic pre-commit fixes"
          body: |
            This PR was automatically generated by the pre-commit workflow.

            Formatting or lint issues were detected.

            Please merge this PR into your branch to make the original PR pass.
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      # ❌ Fail if ANY hook failed
      - name: Fail workflow if hooks failed
        if: steps.hooks.outputs.exit_code != '0'
        run: |
          echo "Pre-commit checks failed."
          echo "If formatting fixes were possible, a fix PR has been created."
          exit 1
