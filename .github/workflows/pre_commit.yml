name: Pre-commit

on:
  pull_request:
    branches:
      - dev
      - test
  push:
    branches:
      - dev
      - test
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pre-commit-${{ github.repository }}/${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    if: |
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.ref_name, 'pre-commit-fixes/')

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false   # prevent auth header conflict

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('webclient/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 🔧 Install project dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pip-licenses
          pip install -r webclient/requirements.txt
          pip install pre-commit

      # 📄 Regenerate license RST
      - name: Run convert_to_rst.py
        run: python docs/licenses/convert_to_rst.py

      # 🔍 Run pre-commit and capture exit code
      - name: Run pre-commit
        id: hooks
        run: |
          set +e
          pre-commit run --all-files
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      # 🔎 Detect ANY changes (formatting or RST)
      - name: Check for file changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 🛠 Create PR with ALL changes
      - name: Create Pull Request with fixes
        id: create_pr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pre-commit-fixes/${{ github.event.pull_request.number || github.ref_name }}
          delete-branch: true
          commit-message: "chore: apply pre-commit fixes and update licenses"
          title: "Automatic formatting and documentation updates"
          base: ${{ github.head_ref || github.ref_name }}
          body: |
            This PR was automatically generated by the CI workflow.

            It includes:

            - Pre-commit formatting fixes
            - Updated `python_knihovny.rst` (pip license list)

            Please merge this PR to make the original PR pass.
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      - name: Rebase fix branch if PR was updated
        id: rebase
        if: steps.changes.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-operation == 'updated'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FIX_BRANCH="pre-commit-fixes/${{ github.event.pull_request.number || github.ref_name }}"
          git fetch origin
          git checkout -B "$FIX_BRANCH" origin/"$FIX_BRANCH"
          if [ -n "${{ github.event.pull_request.base.ref }}" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
          else
            BASE="${{ github.ref_name }}"
          fi
          git fetch origin "$BASE"
          if git rebase origin/"$BASE"; then
            git push --force-with-lease origin "$FIX_BRANCH"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "Rebase conflict detected."
            git rebase --abort || true
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Publish pre-commit result to workflow summary
        if: steps.hooks.outputs.exit_code != '0' || steps.changes.outputs.changed == 'true'
        run: |
          echo "## ⚠️ Pre-commit results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Pre-commit exit code: ${{ steps.hooks.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes detected: ${{ steps.changes.outputs.changed || 'false' }}" >> $GITHUB_STEP_SUMMARY
      
          if [ "${{ steps.rebase.outputs.status }}" = "conflict" ]; then
            echo "- Rebase status: ❌ Conflict (manual rebase required)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.rebase.outputs.status }}" = "success" ]; then
            echo "- Rebase status: ✅ Successful" >> $GITHUB_STEP_SUMMARY
          fi
      
          echo "" >> $GITHUB_STEP_SUMMARY
      
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "A fix PR has been created or updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "Pre-commit checks failed and require manual fixes." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on original PR (sticky)
        if: github.event_name == 'pull_request' && (steps.hooks.outputs.exit_code != '0' || steps.changes.outputs.changed == 'true')
        uses: actions/github-script@v8
        with:
          script: |
            const changed = "${{ steps.changes.outputs.changed }}" === "true";
            const exitCode = "${{ steps.hooks.outputs.exit_code }}";
            const rebaseStatus = "${{ steps.rebase.outputs.status || '' }}";
            const marker = "<!-- precommit-bot-comment -->";
            let body = `${marker}
            ## ⚠️ Pre-commit results
            
            - Exit code: ${exitCode}
            - Changes detected: ${changed}
            `;
            if (changed) {
              const fixPrNumber = "${{ steps.create_pr.outputs.pull-request-number || '' }}";
              const fixPrUrl = "${{ steps.create_pr.outputs.pull-request-url || '' }}";
              if (fixPrNumber && fixPrUrl) {
                body += `
                An automatic fix PR has been created or updated: [#${fixPrNumber}](${fixPrUrl})
                
                Please merge it to make this PR pass.
                `;
              } else {
                body += `
                An automatic fix PR has been created or updated.
                Please merge it to make this PR pass.
                `;
                }
            } else {
              body += `
              Pre-commit checks failed and require manual fixes.
              `;
            }
            if (rebaseStatus === "conflict") {
              body += `
              ⚠️ Rebase conflict detected. Manual rebase is required on the fix PR.
              `;
            }
            body = body.replace(/^[ \t]+/gm, '');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(
              c => c.user.type === "Bot" && c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }
