name: Pre-commit

on:
  pull_request:
    branches:
      - dev
      - test
  push:
    branches:
      - dev
      - test
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pre-commit-${{ github.repository }}/${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    if: |
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.ref_name, 'pre-commit-fixes/')

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false   # prevent auth header conflict

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('webclient/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 🔧 Install project dependencies
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pip-licenses
          pip install -r webclient/requirements.txt
          pip install pre-commit

      # 📄 Regenerate license RST
      - name: Run convert_to_rst.py
        run: python docs/licenses/convert_to_rst.py

      # 🔍 Run pre-commit and capture exit code
      - name: Run pre-commit
        id: hooks
        run: |
          set +e
          pre-commit run --all-files
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          exit 0

      # 🔎 Detect ANY changes (formatting or RST)
      - name: Check for file changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 🛠 Create PR with ALL changes
      - name: Create Pull Request with fixes
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pre-commit-fixes/${{ github.event.pull_request.number || steps.vars.outputs.sha_short }}-${{ github.run_id }}
          delete-branch: true
          commit-message: "chore: apply pre-commit fixes and update licenses"
          title: "Automatic formatting and documentation updates"
          base: ${{ github.head_ref || github.ref_name }}
          body: |
            This PR was automatically generated by the CI workflow.

            It includes:

            - Pre-commit formatting fixes
            - Updated `python_knihovny.rst` (pip license list)

            Please merge this PR to make the original PR pass.
          assignees: ${{ github.actor }}
          reviewers: ${{ github.actor }}

      # ❌ Fail original workflow if pre-commit failed
      - name: Fail workflow if hooks failed
        if: ${{ steps.hooks.outputs.exit_code != '0' || steps.changes.outputs.changed == 'true' }}
        run: |
          echo "Pre-commit checks failed or changes were required."
          echo "A fix PR has been created if changes were auto-fixable."
          exit 1
