name: Build and publish Docker images - GitHub
on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true

env:
  IMAGE_NAME_REDIS: aiscr-webamcr-redis
  IMAGE_NAME_PROXY: aiscr-webamcr-proxy
  IMAGE_NAME_PROD: aiscr-webamcr
  REGISTRY: ghcr.io

jobs:
  build_publish_images:
    name: Build and push images to GitHub
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set tags and names
        run: |
          echo "${{ inputs.tag }}"
          echo "tag_version=$(echo ${{ inputs.tag }} | sed 's/^v//')" >> $GITHUB_ENV

      #---------------------
      # BUILD PROD
      #---------------------
      - name: Set tags prod
        run: |
          if [ "${{ inputs.latest }}" == 'false' ]; then
            echo "prod_tags=$(echo ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_PROD }}:${{ env.tag_version }} | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          else
            echo "prod_tags=$(echo ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_PROD }}:${{ env.tag_version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROD }}:latest | tr '[A-Z]' '[a-z]')"" >> $GITHUB_ENV
          fi
          echo "date_created=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV
          
      - name: PRODUCTION - Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-production
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.prod_tags }}
          build-args: |
            VERSION_APP=${{ env.tag_version }}
            TAG_APP=${{ github.ref }}
            DATE_CREATED=${{ env.date_created }}
            REVISION=${{ github.sha }}
      
      - name: Attest
        uses: actions/attest-build-provenance@v1
        id: attest
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROD }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      #---------------------
      # BUILD PROXY
      #---------------------
      - name: Set tags proxy
        run: |
          if [ "${{ inputs.latest }}" == 'false' ]; then
            echo "proxy_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}:${{ env.tag_version }}" >> $GITHUB_ENV
          else
            echo "proxy_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}:${{ env.tag_version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}:latest" >> $GITHUB_ENV
          fi

      - name: PROXY - Build and push Docker image
        id: push_proxy
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.proxy_tags }}
          build-args: |
            VERSION_APP=${{ env.tag_version }}
            TAG_APP=${{ github.ref }}

      - name: Attest - proxy
        uses: actions/attest-build-provenance@v1
        id: attest_proxy
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}
          subject-digest: ${{ steps.push_proxy.outputs.digest }}
          push-to-registry: true
          
      #---------------------
      # BUILD REDIS
      #---------------------
      - name: Set tags redis
        run: |
          if [ "${{ inputs.latest }}" == 'false' ]; then
            echo "redis_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}:${{ env.tag_version }}" >> $GITHUB_ENV
          else
            echo "redis_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}:${{ env.tag_version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}:latest" >> $GITHUB_ENV
          fi

      - name: REDIS - Build and push Docker image
        id: push_redis
        uses: docker/build-push-action@v6
        with:
          context: ./redis
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.redis_tags }}
          build-args: |
            VERSION_APP=${{ env.tag_version }}
            TAG_APP=${{ github.ref }}

      - name: Attest - Redis
        uses: actions/attest-build-provenance@v1
        id: attest_redis
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}
          subject-digest: ${{ steps.push_redis.outputs.digest }}
          push-to-registry: true
