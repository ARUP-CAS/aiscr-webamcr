name: New version

on:
  workflow_dispatch:
    inputs:
      new_tag:
        description: 'Tag name following "vx.x.x" semantics (e.g. "v1.0.0"):'
        type: string
        required: true
      pip_update:
        description: 'Update pip package list'
        type: boolean
        required: true
        default: true
      citation_update:
        description: 'Update citation'
        type: boolean
        required: true
        default: true
      environment:
        description: 'Environment'
        type: choice
        options:
          - production
          - testing
        required: true
        default: testing
   
jobs:
  update_files:
    name: Update citation and libraries list
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.set-sha.outputs.sha }}
    steps:
      - name: Log-in as AMCR app
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.AISCR_AMCR_ACTIONS_APP_ID }}
          private-key: ${{ secrets.AISCR_AMCR_ACTIONS_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ steps.app-token.outputs.token }}

      - name: Set default SHA
        run: |
          echo "sha=$(git log -1 --format='%h')" >> $GITHUB_ENV

      - name: Set up Python
        if: ${{ inputs.pip_update }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        if: ${{ inputs.pip_update }}      
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses
          pip install -r webclient/requirements.txt

      - name: Run convert_to_rst.py
        if: ${{ inputs.pip_update }}
        run: python docs/licenses/convert_to_rst.py

      - name: Update pip package list
        if: ${{ inputs.pip_update }}
        run: |
          VERSION=${{ inputs.new_tag }}
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global pull.rebase true
          git add docs/source/knihovny_read_only.rst
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update knihovny_read_only.rst for release $VERSION"
            git pull
            git push
            echo "sha=$(git log -1 --format='%h')" >> $GITHUB_ENV
          fi

      - name: Update CITATION.cff
        if: ${{ inputs.citation_update }}
        run: |
          VERSION=${{ inputs.new_tag }}
          DATE=$(date -I)
          sed -i '/title:/!b;n;cversion: "'"$VERSION"'"' CITATION.cff
          sed -i "s/date-released:.*/date-released: $DATE/" CITATION.cff
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global pull.rebase true
          git add CITATION.cff
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update CITATION.cff for release $VERSION"
            git pull
            git push
            echo "sha=$(git log -1 --format='%h')" >> $GITHUB_ENV
          fi

      - name: Set output SHA
        id: set-sha
        run: |
          echo "sha=${{ env.sha }}" >> $GITHUB_OUTPUT
          echo "Output SHA set to: ${{ env.sha }}"
  
  new_version:
    name: Create new tag
    needs: update_files
    permissions:
      contents: write
      deployments: write
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: ${{ inputs.new_tag }}
          commit_sha: ${{ needs.update_files.outputs.sha }}
          
      - name: Check tag exists
        run: |
          echo "Tag already present: ${{ env.TAG_EXISTS }}"

  docker_deploy:
    needs: new_version
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    uses: ./.github/workflows/publish_images.yml
    with:
      tag: ${{ inputs.new_tag }}
      latest: ${{ inputs.environment  == 'production' }}
    secrets: inherit
