name: Build and publish Docker images - DockerHub
on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true
  workflow_dispatch:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true

env:
  IMAGE_NAME_REDIS: aiscr/webamcr-redis
  IMAGE_NAME_PROXY: aiscr/webamcr-proxy
  IMAGE_NAME_PROD: aiscr/webamcr
  REGISTRY: index.docker.io

jobs:
  build_publish_images:
    name: Build and push images to DockerHub
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Set tags and names
        run: |
          echo "${{ inputs.tag }}"
          echo "tag_version=$(echo ${{ inputs.tag }} | sed 's/^v//')" >> $GITHUB_ENV

      #---------------------
      # BUILD PROD
      #---------------------
      - name: Set tags prod
        run: |
          if [ "${{ inputs.latest }}" == 'false' ]; then
            echo "prod_tags=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROD }}:${{ env.tag_version }} | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          else
            echo "prod_tags=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROD }}:${{ env.tag_version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROD }}:latest | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          fi
          echo "date_created=$(date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV
          
      - name: PRODUCTION - Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-production
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.prod_tags }}
          labels: |
            org.opencontainers.image.title=Archaeological Map of the Czech Republic (AMCR)
            org.opencontainers.image.description=The Archaeological Map of the Czech Republic (AMCR) is an information system for the collection, management and presentation of data on archaeological fieldwork in the Czech Republic and for supporting related workflows.
            org.opencontainers.image.url=https://github.com/ARUP-CAS/aiscr-webamcr
            org.opencontainers.image.source=https://github.com/ARUP-CAS/aiscr-webamcr
            org.opencontainers.image.version=${{ env.tag_version }}
            org.opencontainers.image.created=${{ env.date_created }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.authors=Archaeological Information System of the Czech Republic (AIS CR)
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.documentation=https://aiscr-webamcr.readthedocs.io/
          build-args: |
            VERSION_APP=${{ env.tag_version }}
            TAG_APP=${{ github.ref }}
      
      - name: Attest
        uses: actions/attest-build-provenance@v1
        id: attest
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROD }}
          subject-digest: ${{ steps.push.outputs.digest }}

      #---------------------
      # BUILD PROXY
      #---------------------
      - name: Set tags proxy
        run: |
          if [ "${{ inputs.latest }}" == 'false' ]; then
            echo "proxy_tags=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}:${{ env.tag_version }} | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          else
            echo "proxy_tags=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}:${{ env.tag_version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}:latest | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          fi

      - name: PROXY - Build and push Docker image
        id: push_proxy
        uses: docker/build-push-action@v6
        with:
          context: ./proxy
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.proxy_tags }}
          build-args: |
            VERSION_APP=${{ env.tag_version }}
            TAG_APP=${{ github.ref }}

      - name: Attest - proxy
        uses: actions/attest-build-provenance@v1
        id: attest_proxy
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PROXY }}
          subject-digest: ${{ steps.push_proxy.outputs.digest }}
          
      #---------------------
      # BUILD REDIS
      #---------------------
      - name: Set tags redis
        run: |
          if [ "${{ inputs.latest }}" == 'false' ]; then
            echo "redis_tags=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}:${{ env.tag_version }} | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          else
            echo "redis_tags=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}:${{ env.tag_version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}:latest | tr '[A-Z]' '[a-z]')" >> $GITHUB_ENV
          fi

      - name: REDIS - Build and push Docker image
        id: push_redis
        uses: docker/build-push-action@v6        
        with:
          context: ./redis
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.redis_tags }}
          build-args: |
            VERSION_APP=${{ env.tag_version }}
            TAG_APP=${{ github.ref }}

      - name: Attest - Redis
        uses: actions/attest-build-provenance@v1
        id: attest_redis
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_REDIS }}
          subject-digest: ${{ steps.push_redis.outputs.digest }}
