name: Deployment to selected environment
permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      tag:
       description: 'Version tag for deployment (accepts "1.0.0" or "v1.0.0"; Docker images use "1.0.0")'
       type: string
       required: true
      environment:
        description: 'Environment'
        type: choice
        options:
          - DEV
          - TEST
        required: true
        default: TEST
      source:
        description: 'Docker image source'
        type: choice
        options:
          - GitHub
          - DockerHub
        required: true
        default: GitHub 

concurrency:
  group: deploy-${{ github.repository }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  server_deploy_root: /home/amcr/aiscr-webamcr
  dep_script: scripts/ci_deployment/deploy_server.sh

jobs:
  deployment:
    name: Deploy to ${{ inputs.environment }} Server
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_SERVER: ${{ inputs.environment == 'DEV' && secrets.DEPLOYMENT_SERVER_DEV || inputs.environment == 'TEST' && secrets.DEPLOYMENT_SERVER_TEST }}
      SSH_PRIVATE_KEY: ${{ inputs.environment == 'DEV' && secrets.SSH_PRIVATE_KEY_SERVER_DEV || inputs.environment == 'TEST' && secrets.SSH_PRIVATE_KEY_SERVER_TEST }}
      SSH_KNOWN_HOST: ${{ inputs.environment == 'DEV' && secrets.SSH_KNOWN_HOST_DEV || inputs.environment == 'TEST' && secrets.SSH_KNOWN_HOST_TEST }}
    
    steps:
      - name: Normalize deployment tag
        id: normalize-tag
        shell: bash
        run: |
          set -euo pipefail
          raw_tag="${{ inputs.tag }}"
          if [[ ! "$raw_tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid deployment tag '$raw_tag'. Expected 1.2.3 or v1.2.3."
            exit 1
          fi

          image_tag="${raw_tag#v}"
          git_tag="v${image_tag}"

          echo "git_tag=${git_tag}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.normalize-tag.outputs.git_tag }}
          fetch-depth: 0
    
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get --assume-yes --no-install-recommends install openvpn iputils-ping dnsutils          

      - name: Setup VPN config
        run: |
          echo "${{ secrets.VPN_CA_CRT }}" > .github/vpn/openvpn20_huldio_ci_ca.crt
          echo "${{ secrets.VPN_USER_CRT }}" > .github/vpn/openvpn20_huldio_ci_user.crt
          echo "${{ secrets.VPN_USER_KEY }}" > .github/vpn/openvpn20_huldio_ci_user.key
          echo "${{ secrets.VPN_SECRET_USERNAME_PASSWORD }}" > secret.txt

      - name: Connect VPN
        run: sudo openvpn --config ".github/vpn/openvpn20_huldio_ci.ovpn" --daemon --askpass secret.txt

      - name: Wait for VPN & DNS resolve
        shell: bash
        timeout-minutes: 2
        run: |
          for i in {1..10}; do
            if ping -c 1 ${{ env.DEPLOYMENT_SERVER }}; then
              break
            fi
            sleep 3
          done
          if ! ping -c 1 ${{ env.DEPLOYMENT_SERVER }}; then
            echo "::error::VPN connection failed"
            exit 1
          fi

      - name: SSH connection
        shell: bash
        run: |
          set -euo pipefail
          eval $(ssh-agent -s)
          echo "${{ env.SSH_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ env.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          for i in {1..10}; do
            if ping -c 1 ${{ env.DEPLOYMENT_SERVER }}; then break; fi
            sleep 3
          done
          echo "date_stamp=$(date +%Y%m%dT%H%M%S)" >> "$GITHUB_ENV"
          ssh amcr@${{ env.DEPLOYMENT_SERVER }} "sudo bash -s" << EOF
          set -euo pipefail
          cd ${{ env.server_deploy_root }}          
          git fetch --all --tags --force          
          if ! git rev-parse "refs/tags/${{ steps.normalize-tag.outputs.git_tag }}" >/dev/null 2>&1; then
            echo "ERROR: Tag ${{ steps.normalize-tag.outputs.git_tag }} does not exist"
            git tag -l
            exit 1
          fi          
          git checkout -f "refs/tags/${{ steps.normalize-tag.outputs.git_tag }}"          
          chmod +x ${{ env.dep_script }}
          ./${{ env.dep_script }} ${{ steps.normalize-tag.outputs.image_tag }} ${{ env.server_deploy_root }} ${{ inputs.source }}
          EOF

      - name: Disconnect VPN
        if: always()
        run: |
          sudo pkill openvpn || true
