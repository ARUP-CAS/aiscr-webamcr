name: Pre-commit autoupdate

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pre-commit-autoupdate-${{ github.repository }}
  cancel-in-progress: true

jobs:
  autoupdate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: test
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - run: pip install --upgrade pre-commit

      - name: Run autoupdate and capture output
        id: update
        run: |
          pre-commit autoupdate > update.log 2>&1 || true
          echo "UPDATE_LOG<<EOF" >> "$GITHUB_OUTPUT"
          tail -n 200 update.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          if ! git diff --quiet -- .pre-commit-config.yaml; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: test
          branch: chore/pre-commit-autoupdate
          delete-branch: true
          commit-message: "chore: pre-commit autoupdate"
          title: "Pre-commit autoupdate"
          labels: |
            dependencies
            pre-commit
          add-paths: |
            .pre-commit-config.yaml
          body: |
            Updating pre-commit hooks to their latest versions.

            **Update Log:**
            ```text
            ${{ steps.update.outputs.UPDATE_LOG }}
            ```
