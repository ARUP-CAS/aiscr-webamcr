name: Build and publish Docker images

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true

concurrency:
  group: docker-${{ github.repository }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  REGISTRY_GITHUB: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  COMMON_LABELS: |
    org.opencontainers.image.authors=Archaeological Information System of the Czech Republic (AIS CR)
    org.opencontainers.image.documentation=https://aiscr-webamcr.readthedocs.io/
    org.opencontainers.image.licenses=GPL-3.0-or-later

jobs:
  build_publish_images:
    if: startsWith(inputs.tag, 'v')
    name: Build and publish images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [prod, proxy, redis]
        include:
          - component: prod
            context: .
            dockerfile: Dockerfile
            image_name_github: arup-cas/aiscr-webamcr
            image_name_dockerhub: aiscr/webamcr
            description: Archaeological Map of the Czech Republic (AMCR)
            url: https://github.com/ARUP-CAS/aiscr-webamcr

          - component: proxy
            context: ./proxy
            dockerfile: Dockerfile
            image_name_github: arup-cas/aiscr-webamcr-proxy
            image_name_dockerhub: aiscr/webamcr-proxy
            description: Archaeological Map of the Czech Republic (AMCR) - Proxy Server
            url: https://github.com/ARUP-CAS/aiscr-webamcr/tree/${{ inputs.tag }}/proxy

          - component: redis
            context: ./redis
            dockerfile: Dockerfile
            image_name_github: arup-cas/aiscr-webamcr-redis
            image_name_dockerhub: aiscr/webamcr-redis
            description: Archaeological Map of the Czech Republic (AMCR) - Redis Server
            url: https://github.com/ARUP-CAS/aiscr-webamcr/tree/${{ inputs.tag }}/redis

    permissions:
      id-token: write
      packages: write
      contents: read
      security-events: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Compute build metadata
        run: |
          EPOCH=$(git log -1 --pretty=%ct)
          echo "SOURCE_DATE_EPOCH=${EPOCH}" >> $GITHUB_ENV
          echo "SOURCE_DATE_ISO=$(date -u -d @${EPOCH} +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "VERSION_APP=${TAG#v}" >> $GITHUB_ENV
        env:
          TAG: ${{ inputs.tag }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the GitHub registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GITHUB }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the DockerHub registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}
            ${{ matrix.image_name_dockerhub }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.latest }}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.url=${{ matrix.url }}
            org.opencontainers.image.version=${{ env.VERSION_APP }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ env.SOURCE_DATE_ISO }}
            ${{ env.COMMON_LABELS }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          pull: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION_APP=${{ env.VERSION_APP }}
            TAG_APP=${{ inputs.tag }}
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
          cache-from: type=registry,ref=${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}:buildcache,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}@${{ steps.push.outputs.digest }}

      - name: Attest build provenance - GitHub
        id: attest_github
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance - DockerHub
        id: attest_dockerhub
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY_DOCKERHUB }}/${{ matrix.image_name_dockerhub }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output: sbom-${{ matrix.component }}.json

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}
          subject-digest: ${{ steps.push.outputs.digest }}
          predicate-path: sbom-${{ matrix.component }}.json
          predicate-type: https://spdx.dev/Document
          push-to-registry: true

      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
