name: Build and publish Docker images
  
on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true

concurrency:
  group: docker-${{ github.repository }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  REGISTRY_GITHUB: ghcr.io
  REGISTRY_DOCKERHUB: index.docker.io
  COMMON_LABELS: |
    org.opencontainers.image.authors=Archaeological Information System of the Czech Republic (AIS CR)
    org.opencontainers.image.documentation=https://aiscr-webamcr.readthedocs.io/
    org.opencontainers.image.licenses=GPL-3.0-or-later

jobs:
  build_publish_images:
    if: startsWith(inputs.tag, 'v')
    name: Build and publish images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [prod, proxy, redis]
        include:
          - component: prod
            context: .
            dockerfile: Dockerfile
            image_name_github: arup-cas/aiscr-webamcr
            image_name_dockerhub: aiscr/webamcr
            description: Archaeological Map of the Czech Republic (AMCR)
            url: https://github.com/ARUP-CAS/aiscr-webamcr

          - component: proxy
            context: ./proxy
            dockerfile: Dockerfile
            image_name_github: arup-cas/aiscr-webamcr-proxy
            image_name_dockerhub: aiscr/webamcr-proxy
            description: Archaeological Map of the Czech Republic (AMCR) - Proxy Server
            url: https://github.com/ARUP-CAS/aiscr-webamcr/tree/${{ inputs.tag }}/proxy

          - component: redis
            context: ./redis
            dockerfile: Dockerfile
            image_name_github: arup-cas/aiscr-webamcr-redis
            image_name_dockerhub: aiscr/webamcr-redis
            description: Archaeological Map of the Czech Republic (AMCR) - Redis Server
            url: https://github.com/ARUP-CAS/aiscr-webamcr/tree/${{ inputs.tag }}/redis

    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to the GitHub registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GITHUB }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the DockerHub registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}
            ${{ matrix.image_name_dockerhub }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.latest }}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.url=${{ matrix.url }}
            ${{ env.COMMON_LABELS }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION_APP=${{ steps.meta.outputs.version }}
            TAG_APP=${{ inputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}:buildcache,mode=max

      - name: Attest build - GitHub
        uses: actions/attest-build-provenance@v4
        id: attest_github
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/${{ matrix.image_name_github }}
          subject-digest: ${{ steps.push.outputs.digest }}

      - name: Attest build - DockerHub
        uses: actions/attest-build-provenance@v4
        id: attest_dockerhub
        with:
          subject-name: ${{ env.REGISTRY_DOCKERHUB }}/${{ matrix.image_name_dockerhub }}
          subject-digest: ${{ steps.push.outputs.digest }}
          
