name: Build and publish Docker images

on:
  workflow_call:
    inputs:
      tag:
        type: string
        required: true
      latest:
        type: boolean
        required: true

concurrency:
  group: docker-${{ github.repository }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  REGISTRY_GITHUB: ghcr.io
  REGISTRY_DOCKERHUB: docker.io

jobs:
  build_publish_images:
    if: startsWith(inputs.tag, 'v')
    name: Build and publish images
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      packages: write
      contents: read
      security-events: write
      attestations: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Compute build metadata
        run: |
          EPOCH=$(git log -1 --pretty=%ct)
          echo "SOURCE_DATE_EPOCH=${EPOCH}" >> $GITHUB_ENV
          echo "SOURCE_DATE_ISO=$(date -u -d @${EPOCH} +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "VERSION_APP=${TAG#v}" >> $GITHUB_ENV
        env:
          TAG: ${{ inputs.tag }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_GITHUB }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Generate bake definition
        run: |
          if [ "${{ inputs.latest }}" = "true" ]; then
            PROD_LATEST=',"${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr:latest","${{ env.REGISTRY_DOCKERHUB }}/aiscr/webamcr:latest"'
            PROXY_LATEST=',"${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-proxy:latest","${{ env.REGISTRY_DOCKERHUB }}/aiscr/webamcr-proxy:latest"'
            REDIS_LATEST=',"${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-redis:latest","${{ env.REGISTRY_DOCKERHUB }}/aiscr/webamcr-redis:latest"'
          else
            PROD_LATEST=""
            PROXY_LATEST=""
            REDIS_LATEST=""
          fi

          cat <<EOF > docker-bake.hcl
          group "default" {
            targets = ["prod", "proxy", "redis"]
          }

          target "common" {
            pull = true

            args = {
              VERSION_APP        = "${VERSION_APP}"
              TAG_APP            = "${{ inputs.tag }}"
              SOURCE_DATE_EPOCH  = "${SOURCE_DATE_EPOCH}"
            }

            labels = {
              "org.opencontainers.image.authors"       = "Archaeological Information System of the Czech Republic (AIS CR)"
              "org.opencontainers.image.documentation" = "https://aiscr-webamcr.readthedocs.io/"
              "org.opencontainers.image.licenses"      = "GPL-3.0-or-later"
              "org.opencontainers.image.version"       = "${VERSION_APP}"
              "org.opencontainers.image.revision"      = "${{ github.sha }}"
              "org.opencontainers.image.created"       = "${SOURCE_DATE_ISO}"
            }
          }

          target "prod" {
            inherits   = ["common"]
            context    = "."
            dockerfile = "Dockerfile"

            tags = [
              "${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr:${{ inputs.tag }}",
              "${{ env.REGISTRY_DOCKERHUB }}/aiscr/webamcr:${{ inputs.tag }}"${PROD_LATEST}
            ]

            labels = {
              "org.opencontainers.image.description" = "Archaeological Map of the Czech Republic (AMCR)"
              "org.opencontainers.image.url"         = "https://github.com/ARUP-CAS/aiscr-webamcr"
            }

            cache-from = ["type=registry,ref=${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr:buildcache"]
            cache-to   = ["type=registry,ref=${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr:buildcache,mode=min"]
          }

          target "proxy" {
            inherits   = ["common"]
            context    = "./proxy"
            dockerfile = "Dockerfile"

            tags = [
              "${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-proxy:${{ inputs.tag }}",
              "${{ env.REGISTRY_DOCKERHUB }}/aiscr/webamcr-proxy:${{ inputs.tag }}"${PROXY_LATEST}
            ]

            labels = {
              "org.opencontainers.image.description" = "Archaeological Map of the Czech Republic (AMCR) - Proxy Server"
              "org.opencontainers.image.url"         = "https://github.com/ARUP-CAS/aiscr-webamcr/tree/${{ inputs.tag }}/proxy"
            }

            cache-from = ["type=registry,ref=${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-proxy:buildcache"]
            cache-to   = ["type=registry,ref=${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-proxy:buildcache,mode=min"]
          }

          target "redis" {
            inherits   = ["common"]
            context    = "./redis"
            dockerfile = "Dockerfile"

            tags = [
              "${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-redis:${{ inputs.tag }}",
              "${{ env.REGISTRY_DOCKERHUB }}/aiscr/webamcr-redis:${{ inputs.tag }}"${REDIS_LATEST}
            ]

            labels = {
              "org.opencontainers.image.description" = "Archaeological Map of the Czech Republic (AMCR) - Redis Server"
              "org.opencontainers.image.url"         = "https://github.com/ARUP-CAS/aiscr-webamcr/tree/${{ inputs.tag }}/redis"
            }

            cache-from = ["type=registry,ref=${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-redis:buildcache"]
            cache-to   = ["type=registry,ref=${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-redis:buildcache,mode=min"]
          }
          EOF

      - name: Build and push images
        id: bake
        uses: docker/bake-action@v5
        with:
          push: true
          files: docker-bake.hcl

      - name: Extract digests
        id: digests
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          echo "prod=$(jq -r '."prod"."containerimage.digest"'   <<< "$METADATA")" >> $GITHUB_OUTPUT
          echo "proxy=$(jq -r '."proxy"."containerimage.digest"' <<< "$METADATA")" >> $GITHUB_OUTPUT
          echo "redis=$(jq -r '."redis"."containerimage.digest"' <<< "$METADATA")" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images
        run: |
          cosign sign --yes ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr@${{ steps.digests.outputs.prod }}
          cosign sign --yes ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-proxy@${{ steps.digests.outputs.proxy }}
          cosign sign --yes ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-redis@${{ steps.digests.outputs.redis }}

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr@${{ steps.digests.outputs.prod }}
          format: spdx-json
          output: sbom.json

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr
          subject-digest: ${{ steps.digests.outputs.prod }}
          predicate-path: sbom.json
          predicate-type: https://spdx.dev/Document
          push-to-registry: true

      - name: Attest provenance (prod)
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr
          subject-digest: ${{ steps.digests.outputs.prod }}
          predicate-type: https://slsa.dev/provenance/v1
          push-to-registry: true

      - name: Attest provenance (proxy)
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-proxy
          subject-digest: ${{ steps.digests.outputs.proxy }}
          predicate-type: https://slsa.dev/provenance/v1
          push-to-registry: true

      - name: Attest provenance (redis)
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr-redis
          subject-digest: ${{ steps.digests.outputs.redis }}
          predicate-type: https://slsa.dev/provenance/v1
          push-to-registry: true

      - name: Vulnerability scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.REGISTRY_GITHUB }}/arup-cas/aiscr-webamcr@${{ steps.digests.outputs.prod }}
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
