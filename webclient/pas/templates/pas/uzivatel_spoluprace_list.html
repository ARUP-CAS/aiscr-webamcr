{% extends "search_list.html" %}

{% block script2 %}
  <script>
    //modal scripts
    document.addEventListener('DOMContentLoaded', function (event) {
      if (document.getElementsByClassName("spoluprace-aktivovat-btn")){
        const elements = document.getElementsByClassName("spoluprace-aktivovat-btn")
        for (let i = 0; i < elements.length; i++){
          const options = Object.assign(Object.create(defaults), {modalID: "modal-form",
          formID: "aktivace-spoluprace-form",
          modalFormID: "#aktivace-spoluprace-form",
          })
          new Modal(options, elements.item(i).id);
        }
      }
      if (document.getElementsByClassName("spoluprace-deaktivovat-btn")){
        const elements = document.getElementsByClassName("spoluprace-deaktivovat-btn")
        for (let i = 0; i < elements.length; i++){
          const options = Object.assign(Object.create(defaults), {modalID: "modal-form",
          formID: "deaktivace-spoluprace-form",
          modalFormID: "#deaktivace-spoluprace-form",
          })
          new Modal(options, elements.item(i).id);
        }
      }
      if (document.getElementsByClassName("spoluprace-smazat-btn")){
        const elements = document.getElementsByClassName("spoluprace-smazat-btn")
        for (let i = 0; i < elements.length; i++){
          const options = Object.assign(Object.create(defaults), {modalID: "modal-form",
          formID: "smazani-spoluprace-form",
          modalFormID: "#smazani-spoluprace-form",
          })
          new Modal(options, elements.item(i).id);
        }
      }
      const normalizeTooltipText = (text) => text.replace(/\s+/g, ' ').trim();

      const syncActionTooltip = (element_selector) => {
        const elements = document.querySelectorAll(element_selector);
        elements.forEach((td) => {
          const button = td.querySelector('button');
          if (!button) {
            return;
          }

          const tooltipText = normalizeTooltipText(button.textContent || '');
          if (!tooltipText) {
            return;
          }

          td.setAttribute('data-bs-original-title', tooltipText);
        });
      }

      syncActionTooltip("td.aktivace");
      syncActionTooltip("td.smazani");
  });
  </script>
{% endblock %}
