{% for section, field in section.items %}
        {% if section != "section_name" and section != "template" %}
        {% if field.value %}
        <div class="row">
            <div class="label"><strong>{{field.label}}:</strong></div>
            <div class="content"> {{ field.value }}</div>
        </div>
        {% endif %}
        {% endif %}
    {% endfor %}
