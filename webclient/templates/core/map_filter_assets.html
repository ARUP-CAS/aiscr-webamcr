<!-- Leaflet -->
<link rel="stylesheet" href="{% static 'leaflet/dist/leaflet.css' %}"/>
<script src="{% static 'leaflet/dist/leaflet.js' %}"></script>
<!-- MarkerCluster -->
<script src="{% static 'leaflet.markercluster/dist/leaflet.markercluster-src.js' %}"></script>
<link rel="stylesheet" href="{% static 'leaflet.markercluster/dist/MarkerCluster.css' %}"/>
<link rel="stylesheet" href="{% static 'leaflet.markercluster/dist/MarkerCluster.Default.css' %}"/>
<!-- Heatmap -->
<script src="{% static 'js/heatmap/heatmap.js' %}"></script>
<script src="{% static 'js/heatmap/leaflet-heatmap.js' %}"></script>
<!-- FullScreen -->
<script src="{% static 'leaflet-fullscreen/dist/Leaflet.fullscreen.min.js' %}"></script>
<link href="{% static 'leaflet-fullscreen/dist/leaflet.fullscreen.css' %}" rel="stylesheet"/>
<!-- Measure -->
<link rel="stylesheet" href="{% static 'css/leaflet.measure.css' %}"/>
<script src="{% static 'js/leaflet.measure.js' %}"></script>
<!-- Coordinates display -->
<script src="{% static 'js/leaflet.coor.js' %}"></script>

{% if map_layer == "3d" %}
  <!-- Knihovna 3D je ve Web Mercator (EPSG:3857), ne v S-JTSK -->
  <script src="{% static 'js/mapa_settings_mercator.js' %}"></script>
  <script src="{% static 'js/mapa_functions.js' %}"></script>
  <script src="{% static 'js/mapa_basic_functions_mercator.js' %}"></script>
{% else %}
  <script src="{% static 'js/mapa_settings_jtsk.js' %}"></script>
  <script src="{% static 'js/mapa_functions.js' %}"></script>
  <script src="{% static 'js/mapa_basic_functions.js' %}"></script>
{% endif %}
