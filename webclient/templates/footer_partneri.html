{% load i18n %}
{% load static %}

<div class="modal fade app-modal-partneri" id="footerPartneri" tabindex="-1" aria-labelledby="footerPartnerilLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{% trans "templates.footerPartneri.title" %}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
        </button>
      </div>
      <div class="modal-body app-logos mt-4">
        <a href="https://www.msmt.cz/" title="{% trans 'templates.footerPartneri.msmt.title' %}" target="_blank"><img src="{% static 'img/logo-eu-msmt.jpg' %}" alt="" /></a>
        <a href="https://www.aiscr.cz/" title="{% trans 'templates.footerPartneri.aiscr.title' %}" target="_blank"><img src="{% static 'img/logo-aiscr.png' %}" alt="" /></a>
        <a href="https://www.arup.cas.cz/" title="{% trans 'templates.footerPartneri.arup.title' %}" target="_blank"><img src="{% static 'img/logo-arup-cs.png' %}" alt="" /></a>
        <a href="https://www.arub.cz/" title="{% trans 'templates.footerPartneri.arub.title' %}" target="_blank"><img src="{% static 'img/logo-arub-cs.png' %}" alt="" /></a>
        <a href="https://strategie.avcr.cz/" title="{% trans 'templates.footerPartneri.avcr.title' %}" target="_blank"><img src="{% static 'img/logo-sav21.png' %}" alt="" /></a>
        <a href="https://www.interreg-central.eu/Content.Node/VirtualArch.html" title="{% trans 'templates.footerPartneri.virtualArch.title' %}" target="_blank"><img src="{% static 'img/logo-interreg.png' %}" alt="" /></a>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "templates.footerPartneri.closeButton" %}</button>
      </div>
    </div>
  </div>
</div>
