{% load static %}
<html lang="en">

  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <link type="text/css" href="{% static 'css/error_page.css' %}" rel="stylesheet" media="screen">
    <link rel="shortcut icon" id="dynamic-favicon" href="{% static 'loga/favicon.png' %}">
    <title>{% block title %}{% endblock %}</title>
  </head>

  <body class="app-error">
    {# ── Header bar ── #}
    <div class="error-header">
      <div class="error-header-inner">
        <img class="error-header-logo" src="{% static 'img/AMCR-logo-new.png' %}" alt="AMČR">
      </div>
    </div>

    {# ── Main content ── #}
    <div class="error-main">
      <div class="error-card">
        {% block error %}
        {% endblock %}
      </div>
    </div>
  </body>

</html>
