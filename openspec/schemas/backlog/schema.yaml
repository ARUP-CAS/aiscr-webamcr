name: backlog
version: 1
description: Lightweight backlog-item schema for the AIS CR idea backlog — proposal only, promoted to governance-driven when planning starts.
artifacts:
  - id: proposal
    generates: proposal.md
    description: Backlog idea captured with AIS CR header fields and short body
    template: proposal.md
    instruction: >
      Capture one backlog idea using the AIS CR idea shape. This is not a
      full change proposal — it is a placeholder until someone plans it.


      Sections (follow the template exactly):


      - **Title**: one sentence summarizing the idea.

      - **Scope**: one of `hub-only`, `hub+siblings`, `sibling:<repo-name>`,
        `external`, `manual GitHub`, or a short clear combination.

      - **Primary artefacts**: concrete paths when known; otherwise
        `(refine when planning)`.

      - **Status**: usually `backlog`; use `partially addressed` only when work
        already started.

      - **Priority**: `high`, `medium`, or `low` only when ordering is clear;
        otherwise omit the line.

      - **Expected size**: `S`, `M`, `L`, or `XL` only when the effort is
        reasonably guessable; otherwise omit the line.
        Suggested scale: `S` = hours / tiny scope; `M` = days / single area;
        `L` = days to a week / cross-file or multi-repo; `XL` = week+ /
        ecosystem-wide or phased.

      - **Before**: optional `<slug> - reason` sequencing hint.

      - **After**: optional `<slug> - reason` sequencing hint.

      - **Body**: short Markdown prose describing intent and constraints.
        Keep it short; do not paste a full plan, checklist, or formal todos
        list. Add `##` headings only when the idea is long enough to need
        structure.


      Keep the whole file short. This file is not a design document.


      When someone is ready to plan this idea, they run `/aiscr-plan-from-idea`
      (or `/opsx:propose`). That step generates the full governance-driven
      artifact set (proposal → specs → design → tasks) under the same change
      slug and supersedes this backlog proposal.
    requires: []
apply:
  requires:
    - proposal
  tracks: proposal.md
  instruction: |
    Backlog items are not directly applied. To act on this idea, promote it
    into a governance-driven change by running `/aiscr-plan-from-idea` with
    this slug (or `/opsx:propose`). The promotion regenerates the change
    under the `governance-driven` schema and produces the full artifact set.

    Do not run `/opsx:apply` on a backlog-schema change — there are no tasks
    to track until promotion.
