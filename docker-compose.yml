
services:
  web:
    image: ${amcr_image}
    secrets:
      - db_conf
      - mail_conf
      - redis_pass
    volumes:
      - static_data:/vol/web
      - locale_data:/vol/web/locale
      - nginx_data:/vol/web/nginx/data
      - /home/migrace:/vol/data-migrace
      - /opt/selenium_test:/vol/web/selenium_test
    environment:
      - IMAGE_TAG=${IMAGE_TAG}
    networks:
      - prod-net
    ports:
      - "2525:2525"
    healthcheck:
      test: ["CMD-SHELL", "bash /scripts/run-healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 1s
    depends_on:
      - redis
      - celery_worker
      - celery_beat
    sysctls:
      - net.core.somaxconn=1024

  sidecar:
    image: eeacms/rsync:3.0
    environment:
      - CRON_TASK_1=*/1 * * * * rsync -a /vol/web/locale/* /backup/
    volumes:
      - $HOME/translations_backup:/backup
      - locale_data:/vol/web/locale
    command:  
      - client
    networks:
      - prod-net

  redis:
    image: ${redis_image}
    restart: always
    ports:
      - "6379:6379"
    secrets:
      - redis_pass
    command: sh -c 'redis-server /home/redis/redis.conf'
    networks:
      - prod-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'bash /scripts/run-healthcheck_redis.sh']
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  
  redis-exporter:
    image: oliver006/redis_exporter:v1.86.0-alpine
    ports:
      - "9121:9121"
    secrets:
      - redis_pass
      - redis_host
    depends_on:
      - redis
    networks:
      - prod-net
    configs:
      - source: redis_exporter_entrypoint
        target: /docker-entrypoint.d/redis_exporter_entrypoint.sh
        mode: 0555
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/redis_exporter_entrypoint.sh"]


  celery_worker:
    image: ${amcr_image}
    command: celery -A webclient worker -l DEBUG -n worker1@amcr
    environment:
      - IMAGE_TAG=${IMAGE_TAG}
    secrets:
      - db_conf
      - mail_conf
      - redis_pass
    volumes:
      - static_data:/vol/web
      - locale_data:/vol/web/locale
      - nginx_data:/vol/web/nginx/data
      - /home/migrace:/vol/data-migrace
    networks:
      - prod-net
    healthcheck:
      test: ["CMD-SHELL", "bash /scripts/run-healthcheck_celery.sh && bash /code/celery_redis_write.sh"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      - redis

  celery_beat:
    image: ${amcr_image}
    command: celery -A webclient beat -l INFO
    environment:
      - IMAGE_TAG=${IMAGE_TAG}
    secrets:
      - db_conf
      - mail_conf
      - redis_pass
    volumes:
      - static_data:/vol/web
      - locale_data:/vol/web/locale
      - nginx_data:/vol/web/nginx/data
      - /home/migrace:/vol/data-migrace
    networks:
      - prod-net
    healthcheck:
      test: ["CMD-SHELL", "bash /scripts/run-healthcheck_celery.sh && bash /code/celery_redis_write.sh"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    depends_on:
      - redis

  celery_exporter:
    image: danihodovic/celery-exporter:0.10.14
    networks:
      - prod-net
    secrets:
      - redis_pass
      - redis_host
    ports:
      - "9808:9808"
    depends_on:
      - redis
    configs:
      - source: celery_exporter_entrypoint
        target: /docker-entrypoint.d/celery_exporter_entrypoint.sh
        mode: 0555
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/celery_exporter_entrypoint.sh"]

  grafana:
    image: grafana/grafana-enterprise:13.1
    restart: always
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=/run/secrets/grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
    secrets:
      - grafana_admin_password
    ports:
      - "3000:3000"
    networks:
      - prod-net

  prometheus:
    image: prom/prometheus:v3.12.0
    restart: always
    volumes:
      - ./prometheus:/etc/prometheus
      - /opt/docker_logs/prometheus_data:/prometheus
    networks:
      - prod-net
    ports:
      - "9090:9090"
    secrets:
      - prometheus_config
    command:
      - "--config.file=/run/secrets/prometheus_config"
      - "--storage.tsdb.retention.time=${PROM_RETENTION_TIME:-365d}"
      - "--web.enable-admin-api"

  logstash:
    image: docker.elastic.co/logstash/logstash:9.4.2
    restart: always
    environment:
      - LOGSTASH_INTERNAL_PASSWORD=logstash_elastic_pass
      - ELASTIC_HOSTS=logstash_elastic_host
    volumes:
      - logs_volume:/logs
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    networks:
      - prod-net
    secrets:
      - logstash_elastic_pass
      - logstash_elastic_host

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    hostname: elasticsearch
    restart: always
    environment:
      # ES 7.11+ alokuje JVM heap automaticky na ~50 % memory limitu kontejneru;
      # ruční ES_JAVA_OPTS se proto neuvádí.
      - discovery.type=single-node
      - http.host=0.0.0.0
      - XPACK_MONITORING_ENABLED=false
      - ELASTIC_PASSWORD=elastic_pass
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - /opt/docker_logs/elastic_data:/usr/share/elasticsearch/data
      - /opt/docker_logs/elastic_backup:/usr/share/elasticsearch/backup
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    ports:
      - 9200:9200
    networks:
      - prod-net
    secrets:
      - elastic_pass
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.3
    restart: always
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch
    networks:
      - prod-net
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  selenium:
    image: selenium/standalone-chromium:149.0
    ports:
      - 4444:4444
      - 7900:7900
    shm_size: '2gb'
    networks:
      - prod-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker"
      - "/dev/disk/:/dev/disk"
    privileged: true
    command:
      - "--housekeeping_interval=15s"
      - "--docker_only=true"
    ports:
      - "8088:8080"
    networks:
      - prod-net
    restart: always

  postgresql_exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    restart: always
    environment:
      - DATA_SOURCE_URI_FILE=/run/secrets/postgresql_exporter_uri
      - DATA_SOURCE_USER=postgres
      - DATA_SOURCE_PASS_FILE=/run/secrets/postgresql_exporter
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres-exporter/collectors/pg_stat_statements.yaml
    networks:
      - prod-net
    ports:
      - "9187:9187"
    secrets:
      - postgresql_exporter
      - postgresql_exporter_uri
    volumes:
      - ./prometheus/collectors:/etc/postgres-exporter/collectors

volumes:
  static_data:
  locale_data:
  nginx_data:
  logs_volume:
  grafana_data:
  redis_data:

networks:
  prod-net:
    external: true

secrets:
  db_conf:
   external: true
  mail_conf:
   external: true
  redis_pass:
    external: true
  redis_host:
    external: true
  grafana_admin_password:
    external: true
  elastic_pass:
    external: true
  logstash_elastic_pass:
    external: true
  prometheus_config:
    external: true
  postgresql_exporter:
    external: true
  postgresql_exporter_uri:
    external: true
  logstash_elastic_host:
    external: true

configs:
  redis_exporter_entrypoint:
    file: scripts/redis_exporter_entrypoint.sh
  celery_exporter_entrypoint:
    file: scripts/celery_exporter_entrypoint.sh
