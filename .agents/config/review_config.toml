[vendored_exclusions]
directories = [
    "vendor/",
    "vendors/",
    "lib/",
    "libs/",
    "node_modules/",
    "dist/",
]
file_patterns = [
    "*.min.js",
    "*.min.css",
]
copyright_headers = [
    "/*!",
    "* @license",
    "* jQuery",
    "* Bootstrap",
]
filenames = [
    "leaflet.markercluster-src.js",
    "leaflet-search.js",
    "leaflet-search-geocoder.js",
    "leaflet.measure.js",
    "leaflet-grayscale.js",
    "leaflet_subgroup.js",
    "leaflet.coor.js",
    "leaflet.EditCoordControl.js",
    "simpleheat.js",
    "HeatLayer.js",
    "html-to-rtf-browser.js",
    "coordTransform.js",
    "timer.js",
    "datepicker-cs.js",
]
note = """
Vendored files must not be assessed for internal code quality in any task. They may be referenced (e.g. SRI attribute checks in templates).
"""

[prompt_evolution]
apply_manually = true
reviewer = "human"
note = """
Older prompt_evolution evidence was classified; usable rules were incorporated into this review_config.yaml and the canonical aiscr-codebase-review workflow. The temporary legacy evidence report was removed. New U05 feedback remains local evidence for this repository until a human explicitly approves report-to-backlog handoff.
"""

[follow_up]
workflow = "aiscr-codebase-review"
mode = "codebase-review-mode-update"
phases = [
    "U01",
    "U02",
    "U03",
    "U04",
    "U05",
    "U06",
]
output = ".agents/reports/review_reports/final_audit.md"
tools = ".agents/scripts/review_tools.py"
note = """
Incremental update prompt — detects changes, coverage gaps, cross-validation issues, and spot-checks existing findings. Output goes into final_audit.md Changelog section (not separate files). Does not replace the full T01-T11 audit cycle. review_tools.py provides: hash, cross-validate, coverage-gaps, id-inventory, lint-artifacts, prompt-evolution, repo-structure, status. Script is repo-agnostic and config-driven (uses review_config.yaml).
"""
