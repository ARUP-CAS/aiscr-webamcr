[[bug]]
id = "BUG-010"
title = "Dangerous fallback for DEBUG in production.py"
severity = "High"
github_issue = "new issue candidate — cannot verify, GitHub Issues unavailable without authentication"
description = "`DEBUG = get_secret(\"DEBUG\", \"True\") == \"True\"` — the default fallback is the string `\"True\"`. If the `DEBUG` key is missing from the secrets file, the production instance starts with `DEBUG=True`. This exposes full Python tracebacks, settings values, and deactivates Django's security checks."
recommended_fix = "Change the fallback to `\"False\"`: `DEBUG = get_secret(\"DEBUG\", \"False\") == \"True\"`"
task = "T05"
files = [
    { line = 3, path = "webclient/webclient/settings/production.py" },
]

