[uwsgi]
module = webclient.wsgi:application

master = true
processes = 15
enable-threads = false

uid = user
gid = user

socket = :8000
http-socket = :8001
chmod-socket = 660
vacuum = true

die-on-term = true
stats = /tmp/stats.socket
listen = 1024

thunder-lock = true
max-requests = 5000

buffer-size = 65535
