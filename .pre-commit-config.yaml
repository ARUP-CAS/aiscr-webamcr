repos:
  - repo: https://github.com/pycqa/isort
    rev: 8.0.0
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "black"]
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        args: [ "--line-length", "120" ]
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
  - repo: local
    hooks:
      - id: method-docstring-style-reminder
        name: Method docstring style reminder (non-blocking)
        entry: python3 docs/check_method_docstrings.py
        language: system
        types: [python]
        verbose: true
      - id: generate-module-docs
        name: Generate module documentation
        entry: python3 docs/generate_module_docs.py
        language: system
        pass_filenames: false
        always_run: true
      - id: generate-selenium-test-docs
        name: Generate selenium test documentation
        entry: python3 docs/generate_selenium_test_docs.py
        language: system
        pass_filenames: false
        always_run: true
exclude: (migrations)
