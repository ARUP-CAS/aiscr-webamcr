repos:
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "black"]
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args: [ "--line-length", "120" ]
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
  - repo: local
    hooks:
      - id: container-image-reference-parity
        name: Container image reference parity (Dockerfile + compose)
        entry: python scripts/check_container_image_reference_parity.py --fix
        language: python
        pass_filenames: false
        always_run: true
        files: (?i)(^|/)(dockerfile[^/]*|[^/]+\.dockerfile|docker-compose.*\.ya?ml|git_docker-compose.*\.ya?ml)$
        require_serial: true
        additional_dependencies:
          - ruamel.yaml>=0.18.0
          - packaging>=23.0
      - id: npm-vendor-package-names
        name: NPM vendor names vs base.py
        entry: python scripts/check_npm_vendor_package_names.py --fix
        language: python
        pass_filenames: false
        files: ^(package\.json|webclient/webclient/settings/base\.py)$
        require_serial: true
      - id: method-docstring-style-reminder
        name: Method docstring style reminder (non-blocking)
        entry: python docs/check_method_docstrings.py
        language: python
        types: [python]
        verbose: true
      - id: generate-module-docs
        name: Generate module documentation
        entry: python docs/generate_module_docs.py
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies: [pyyaml]
      - id: generate-selenium-test-docs
        name: Generate selenium test documentation
        entry: python docs/generate_selenium_test_docs.py
        language: python
        pass_filenames: false
        always_run: true
exclude: (migrations)
