approval_policy = "on-request"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
model_verbosity = "low"

# Advisory only; always exit 0. Run Codex from repo root so relative paths resolve.
# Skill-usage NDJSON sink: gitignored `<repo>/.venv/aiscr-skill-usage/raw/` (see skill_usage_paths.py; CI uses checkout `.venv`).
notify = ["python", ".agents/scripts/codex_notify_advisory.py"]

[sandbox]
mode = "workspace-write"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
